spring:
  application:
    name: mail-notifier-service

management:

  endpoints:
    web:
      base-path: /
      exposure:
        include: "*"
  info:
    env:
      enabled: true

  endpoint: 
    health: 
      show-details: always

info:
  application:
    groupId: '@project.groupId@'
    artifactId: '@project.artifactId@'
    version: '@project.version@'


app:
  mail-settings:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    connectionTimeout: 5000
    timeout: 3000
    writeTimeout: 3000


send:
  mail: ${CORREO_PRUEBA}
  password: ${PASSWORD}

resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        sliding-window-size: 5
        sliding-window-type: count_based

        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 1

        register-health-indicator: false
        record-exceptions:
          - java.lang.Exception
  instances:
    mailSender:
      base-config: default
