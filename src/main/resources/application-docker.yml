spring:
  application:
    name: Resilient Notification Microservice

server:
  port: 5002
  compression:
    enabled: true
    min-respnse-size: 2048
    mime-types: application/json,application/xml,text/xml,text/plain
  servlet:
    context-path: /api/v1

management:
  info:
    env:
      enabled: true
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      base-path: /
      exposure:
        include: "*"
      cors:
        allowed-origins: ${ Resilient Notification Microservice}
        allowed-methods: "GET,OPTIONS"

resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        sliding-window-size: 5
        sliding-window-type: count_based

        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1

        register-health-indicator: false
        record-exceptions:
          - java.lang.Exception
  instances:
    mailSender:
      base-config: default

  ratelimiter:
    configs:
      default:
        limit-for-period: 2
        limit-refresh-period: 60s
        timeout-duration: 1s

    instances:
      post-sendMail:
        base-config: default

send:
  username: ${USER_NAME}
  mail: ${CORREO_PRUEBA}
  password: ${PASSWORD}

info:
  application:
    groupId: '@project.groupId@'
    artifactId: '@project.artifactId@'
    version: '@project.version@'


app:
  mail-settings:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    connectionTimeout: 10000
    timeout: 10000
    writeTimeout: 10000

cors-settings:
  url: ${URL_CORS_PERMITION}